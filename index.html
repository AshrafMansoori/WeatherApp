<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="state">
            <div class="city">
                <div class="cityname"><img src="im.svg" class="icon" alt=""><span class="delhi">Delhi</span></div>
                <span class="span1">Monday,10 June 2026</span>
            </div>
            <div class="search"><input class="inp" type="text" placeholder="Enter City"><img class="icon1"
                    src="search.svg" alt=""></div>
        </div>
        <div class="temp">
            <div class="temprature ">
                <div class="temp2"></div> <span class="temp1">partially cloud</span>

            </div>
            <div class="temprature cloud"><span>🌤️</span></div>
        </div>
        <div class="info">
            <div class=" box box1">
                <span class="block"><img class="fav4" src="temp.png" alt=""></span>
                <span class="block">feels like</span>
                <span class="block t">36°C</span>
            </div>
            <div class="box box2">
                <span class="block"><img class="fav4" src="drop.png" alt=""></span>
                <span class="block ">Humidity</span>
                <span class="block h">45%</span>

            </div>
            <div class="box box3">
                <span class="block"><img class="fav4" src="wind.png" alt=""></span>
                <span class="block">Wind</span>
                <span class="block w">12km/ph</span>
            </div>
            <div class="box box4">

                <span class="block"><img class="fav4" src="gauge.png" alt=""></span>
                <span class="block">Pressure</span>
                <span class="block p">10008pa</span>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
